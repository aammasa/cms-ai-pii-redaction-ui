<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62 62" fill="none">
  <!-- Base circle -->
  <circle cx="31" cy="31" r="30" fill="#005596"/>

  <!-- Globe grid lines (white, subtle) -->
  <!-- Vertical meridians -->
  <ellipse cx="31" cy="31" rx="30" ry="30" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <ellipse cx="31" cy="31" rx="18" ry="30" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <ellipse cx="31" cy="31" rx="7"  ry="30" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <!-- Horizontal parallels -->
  <line x1="1" y1="31" x2="61" y2="31" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <path d="M 3.5 20 Q 31 15 58.5 20"  fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <path d="M 3.5 42 Q 31 47 58.5 42"  fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <path d="M 10 11 Q 31 5  52 11"     fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <path d="M 10 51 Q 31 57 52 51"     fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

