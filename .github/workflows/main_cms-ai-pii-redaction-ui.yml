name: Build and deploy React app to Azure Web App - cms-ai-pii-redaction-ui

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Add a minimal express server so Azure Web App (Linux/Node) can serve
      # the static SPA with proper fallback routing.
      - name: Add static server to dist and install its dependencies
        run: |
          cat > dist/server.js << 'EOF'
          const express = require('express');
          const path = require('path');
          const app = express();
          const port = process.env.PORT || 8080;
          app.use(express.static(path.join(__dirname)));
          app.get('*', (_req, res) => res.sendFile(path.join(__dirname, 'index.html')));
          app.listen(port, () => console.log(`Server running on port ${port}`));
          EOF

          cat > dist/package.json << 'EOF'
          {
            "name": "cms-ai-pii-redaction-ui",
            "version": "1.0.0",
            "main": "server.js",
            "scripts": { "start": "node server.js" },
            "dependencies": { "express": "^4.18.2" }
          }
          EOF

          # Install express inside dist/ so the package is fully self-contained.
          # Azure will just run "node server.js" without needing a separate npm install.
          cd dist && npm install --omit=dev

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/        # only the built output — no node_modules, no source

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cms-ai-pii-redaction-ui'
          slot-name: 'Production'
          package: dist/
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_909C0B63BE644270AF4784EDDDB0F71E }}
